apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # Must follow: <plural>.<group> format
  name: myapps.cka.example.com
spec:
  group: cka.example.com          # Custom API group
  versions:
    - name: v1
      served: true                # This version is active/served
      storage: true               # This version is stored in etcd
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                environment:
                  type: string
                  enum: ["dev", "staging", "prod"]
  scope: Namespaced               # Can also be Cluster-scoped
  names:
    plural: myapps                # kubectl get myapps
    singular: myapp               # kubectl get myapp
    kind: MyApp                   # Used in YAML manifests
    shortNames:
      - ma                        # kubectl get ma  (shortcut)
