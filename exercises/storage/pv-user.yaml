apiVersion: v1
kind: Pod
metadata:
  labels:
    run: pv-user
  name: pv-user
  namespace: cka-storage-3
spec:
  volumes:
  - name: persist
    persistentVolumeClaim:
      claimName: pvc-static-1
  containers:
  - image: nginx
    name: pv-user
    command: ['sh','-c','echo "first step: writing to filename: /data/file" > /data/file; sleep 5; echo "\nsecond step: reading from the file"; echo; cat /data/file;']
    volumeMounts:
    - name: persist
      mountPath: /data
