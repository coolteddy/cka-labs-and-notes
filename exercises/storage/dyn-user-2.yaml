apiVersion: v1
kind: Pod
metadata:
  labels:
    run: dyn-user-2
  name: dyn-user-2
  namespace: cka-storage-4
spec:
  volumes:
  - name: dyn-pvc
    persistentVolumeClaim:
      claimName: pvc-dynamic-1
  containers:
  - image: nginx
    name: dyn-user-2
    command: ['sh','-c','echo "READ: "; cat /data/hello.txt; sleep 3600']
    volumeMounts:
    - name: dyn-pvc
      mountPath: /data    
