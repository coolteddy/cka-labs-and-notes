apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cka-net-3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
