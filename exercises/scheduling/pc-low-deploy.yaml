apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pc-low-deploy
  name: pc-low-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pc-low-deploy
  strategy: {}
  template:
    metadata:
      labels:
        app: pc-low-deploy
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3d-lab-agent-0      
      containers:
      - image: nginx
        name: nginx
        resources: 
          requests:
            cpu: "5"
            memory: "100Mi"
status: {}
