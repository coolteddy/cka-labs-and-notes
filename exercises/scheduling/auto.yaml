apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: autoscale-web
  name: autoscale-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscale-web
  strategy: {}
  template:
    metadata:
      labels:
        app: autoscale-web
    spec:
      containers:
      - image: nginx
        name: nginx
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi" 
status: {}
