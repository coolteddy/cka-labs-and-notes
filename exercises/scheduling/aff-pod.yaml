apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: aff-pod
  name: aff-pod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aff-pod
  template:
    metadata:
      labels:
        app: aff-pod
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: disk
                operator: In
                values: 
                - ssd
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
